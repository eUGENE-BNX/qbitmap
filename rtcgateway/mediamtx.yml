###############################################
# MediaMTX - WebRTC Gateway Configuration
# Server: 91.98.90.57 (rtcgateway)
###############################################

logLevel: info
logDestinations: [stdout]

###############################################
# API Server (for recording control)
###############################################
api: yes
apiAddress: :9997
apiAllowOrigins: ["https://qbitmap.com", "https://stream.qbitmap.com"]
apiTrustedProxies: ["91.99.219.248"]
apiEncryption: false

###############################################
# Playback Server (for recorded video access)
###############################################
playback: yes
playbackAddress: :9996

###############################################
# Metrics Server (Prometheus format)
###############################################
metrics: yes
metricsAddress: :9998

###############################################
# RTSP Server
###############################################
rtsp: yes
rtspTransports: [tcp]
rtspAddress: :8554

###############################################
# WebRTC Server
###############################################
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcServerKey: ""
webrtcServerCert: ""
webrtcAllowOrigins: ["https://qbitmap.com", "https://stream.qbitmap.com"]
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcIPsFromInterfaces: yes
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: [91.98.90.57]

###############################################
# HLS - Primary viewing protocol (fMP4)
###############################################
hls: yes
hlsAddress: :8888
hlsEncryption: no
# Lock CORS to qbitmap origins. The HLS port (8888) is already
# unreachable from the public internet thanks to Hetzner Cloud FW
# (S1-only) + Caddy hls.qbitmap.com proxy, so this is the third
# layer — browsers calling the playlist directly with another
# Origin header will be denied at the muxer level. MediaMTX 1.18
# expects this as a comma-separated string on a singular key
# (hlsAllowOrigin), not an array on hlsAllowOrigins.
hlsAllowOrigin: "https://qbitmap.com,https://stream.qbitmap.com,https://hls.qbitmap.com"
hlsTrustedProxies: [91.99.219.248]
hlsVariant: lowLatency
hlsSegmentCount: 10
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsMuxerCloseAfter: 30s
hlsAlwaysRemux: true

###############################################
# RTMP - Enabled for GoPro, OBS, etc.
###############################################
rtmp: yes
rtmpAddress: :1935

###############################################
# SRT - Disabled (not needed)
###############################################
srt: no

###############################################
# Path Defaults
###############################################
pathDefaults:
  sourceProtocol: tcp
  overridePublisher: no
  record: no
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 1h
  recordDeleteAfter: 360h

###############################################
# Paths - Managed dynamically via API
# Cameras are added from qbitmap-backend
###############################################
paths:
  # Office 04 (Tapo C236) — substream H.264 High profile produces broken
  # NAL access units in MediaMTX's fmp4 muxer (recording playback shows
  # "missing picture in access unit" / "no frame!"). Idle state below is
  # the original direct-RTSP config; live WHEP works fine because Chrome
  # WebRTC tolerates broken NAL where the MP4 demuxer doesn't.
  # Backend (cameras.needs_remux=1) switches the path to source: publisher
  # + runOnInit ffmpeg ... -bsf:v h264_mp4toannexb on recording start,
  # and switches it back on recording stop. ffmpeg only runs while
  # recording is active.
  cam_1_mo8fjaf2_60b73dbc22a9ae99:
    source: rtsp://qbitc236:c236c236@212.253.82.220:13554/stream2
    sourceProtocol: tcp
    sourceOnDemand: true
    sourceOnDemandStartTimeout: 10s
    sourceOnDemandCloseAfter: 60s

###############################################
# Authentication
###############################################
authMethod: internal
authInternalUsers:
  # Backend server: full access (API, metrics, read, playback)
  - user: any
    pass:
    ips: [91.99.219.248]
    permissions:
      - action: api
        path:
      - action: metrics
        path:
      - action: read
        path:
      - action: playback
        path:
  # Localhost: full access (API, metrics, pprof, read, publish, playback)
  - user: any
    pass:
    ips: [127.0.0.1, '::1']
    permissions:
      - action: api
        path:
      - action: metrics
        path:
      - action: pprof
        path:
      - action: read
        path:
      - action: publish
        path:
      - action: playback
        path:
  # External users: publish only (RTMP from GoPro/OBS)
  # Path names are cryptographically random - unguessable
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
