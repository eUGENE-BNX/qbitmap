<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="QBitmap - Vision Network">
  <title>QBitmap | Vision Network</title>
  <link rel="icon" href="data:,">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5Y929W13D6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5Y929W13D6', { send_page_view: false });
  </script>

  <!-- Preload critical resources -->
  <link rel="preload" href="/vendor/maplibre-gl.js" as="script">
  <link rel="preload" href="/vendor/basemaps.js" as="script">

  <!-- Plyr Video Player -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.8.4/plyr.css" integrity="sha384-VqqE0KSv00qfHvKpRa8aov+g3xtUu2Rw0NsEmtjTOPGn/JDKVghgd56iw/VObHa7" crossorigin="anonymous">

  <!-- Vendor libraries in head so they execute before Vite's module scripts -->
  <script defer src="/vendor/hls.min.js"></script>
  <script defer src="/vendor/maplibre-gl.js"></script>
  <script defer src="/vendor/basemaps.js"></script>
  <script defer src="/vendor/h3-js.umd.js"></script>
  <script defer src="/vendor/deck.gl.min.js"></script>
  <script defer src="/vendor/protobuf.min.js"></script>
  <!-- Three.js ES Module Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
    }
  }
  </script>
  <script async src="https://cdn.plyr.io/3.8.4/plyr.polyfilled.js" integrity="sha384-ZDYtn77N2Oxc6W8oilE9z73hj1EZqidVlQeqTwsKW19gglwyUYHMn/LzX+ewyFJD" crossorigin="anonymous"></script>
</head>
<body>
  <div id="map"></div>

  <!-- Top Header Bar -->
  <div id="top-header">
    <div class="header-left">
      <div class="qbitmap-logo-control" title="QBitmap">
        <img src="/logo.png" alt="QBitmap">
        <span class="logo-text">QBitmap</span>
      </div>
      <div id="auth-container"></div>
      <div class="vmsg-search-bar" id="vmsg-search-toggle">
        <svg class="vmsg-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="vmsg-search-bar-input" id="vmsg-search-bar-input"
               placeholder="Arama yap..." autocomplete="off" maxlength="100">
      </div>
    </div>
  </div>
  

  <!-- ================= MODAL PENCERE BAŞLANGIÇ ================= -->
  <div id="imageModal" class="modal" role="dialog" aria-modal="true" aria-label="Görüntü önizleme">
    <span class="close" role="button" aria-label="Kapat" tabindex="0">&times;</span>
    <img class="modal-content" id="modalImage" alt="">
    <div id="caption"></div>
  </div>
  <!-- ================== MODAL PENCERE BİTİŞ ================== -->

  <!-- ================= BIOMETRIC MODAL BAŞLANGIÇ ================= -->
  <div id="biometric-modal" class="biometric-modal" role="dialog" aria-modal="true" aria-label="Yüz tanıma ile giriş" onclick="if(event.target===this)BiometricAuth.close()">
    <div class="biometric-content">
      <div class="camera-preview">
        <video id="biometric-video" playsinline aria-label="Kamera görüntüsü"></video>
        <canvas id="biometric-canvas" style="display:none;" aria-hidden="true"></canvas>
        <canvas id="biometric-overlay" aria-hidden="true"></canvas>
        <div class="biometric-status" id="biometric-status" role="status" aria-live="polite">Yüzünüzü kameraya gösterin</div>
      </div>
    </div>
  </div>
  <!-- ================== BIOMETRIC MODAL BİTİŞ ================== -->

  <!-- 3D models (ES modules) -->
  <script type="module" src="/js/3d-models.js"></script>
  <script type="module" src="/js/particle-cube.js"></script>
  <!-- Main app entry point -->
  <script type="module" src="/js/main.js"></script>
</body>
</html>
