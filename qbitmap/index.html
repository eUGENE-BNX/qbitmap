<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="QBitmap - Vision Network">
  <title>QBitmap | Vision Network</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="QBitmap">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Google Analytics 4 (bootstrap lives in js/html-bootstrap.js so CSP can drop 'unsafe-inline') -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5Y929W13D6"></script>

  <!-- Vendor libraries (maplibre, basemaps, hls, deck.gl, h3-js, plyr) are
       all loaded on demand via vendor-loader.js. The Caddy `Link rel=preload`
       header on this route warms the browser cache for maplibre + basemaps
       so map.js's dynamic load resolves immediately. -->
</head>
<body>
  <div id="map"></div>

  <!-- Top Header Bar -->
  <div id="top-header">
    <div class="header-left">
      <div class="qbitmap-logo-control" title="QBitmap">
        <img src="/logo.png" alt="QBitmap" width="28" height="28">
        <span class="logo-text">QBitmap</span>
      </div>
      <div id="auth-container"></div>
      <div class="vmsg-search-bar" id="vmsg-search-toggle">
        <svg class="vmsg-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="vmsg-search-bar-input" id="vmsg-search-bar-input"
               placeholder="Arama yap..." autocomplete="off" maxlength="100">
      </div>
    </div>
  </div>
  

  <!-- ================= MODAL PENCERE BAŞLANGIÇ ================= -->
  <div id="imageModal" class="modal" role="dialog" aria-modal="true" aria-label="Görüntü önizleme">
    <span class="close" role="button" aria-label="Kapat" tabindex="0">&times;</span>
    <img class="modal-content" id="modalImage" alt="">
    <div id="caption"></div>
  </div>
  <!-- ================== MODAL PENCERE BİTİŞ ================== -->

  <!-- Main app entry point -->
  <script type="module" src="/js/main.js"></script>
</body>
</html>
